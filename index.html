<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>

        <style>
            /* 全螢幕引導遮罩 */
            #permission-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(255, 255, 255, 0.98);
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
                padding: 20px;
                box-sizing: border-box;
                text-align: center;
            }

            .prompt-box {
                max-width: 420px;
                background: #ffffff;
                padding: 30px;
                border-radius: 16px;
                box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            }

            .icon {
                font-size: 48px;
                margin-bottom: 15px;
            }

            h2 {
                color: #333;
                margin: 0 0 15px 0;
                font-size: 22px;
            }

            p {
                color: #666;
                font-size: 15px;
                line-height: 1.6;
                margin: 0 0 20px 0;
            }

            .tutorial-steps {
                text-align: left;
                background: #f8f9fa;
                padding: 20px;
                border-radius: 12px;
                margin-bottom: 25px;
                border: 1px solid #e9ecef;
            }

            .step-item {
                margin-bottom: 15px;
                font-size: 14px;
                color: #495057;
                line-height: 1.5;
            }

            .step-item strong {
                color: #007aff;
                display: block;
                margin-bottom: 3px;
            }

            .btn {
                background-color: #007aff;
                color: white;
                border: none;
                padding: 14px 30px;
                font-size: 16px;
                font-weight: 600;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0.2s;
                width: 100%;
            }

            .btn:hover {
                background-color: #0056b3;
            }

            .instruction {
                display: none;
                text-align: left;
                background: #fff3cd;
                padding: 15px;
                border-radius: 8px;
                margin-top: 15px;
                font-size: 14px;
                color: #664d03;
                border: 1px solid #ffe69c;
            }
            
            .instruction ol {
                padding-left: 20px;
                margin: 5px 0 0 0;
            }
        </style>
    </head>

    <body style="margin: 0; overflow: hidden;">

        <div id="permission-overlay">
            <div class="prompt-box">
                <div class="icon" id="prompt-icon">⚾</div>
                <h2 id="prompt-title">棒球 AR 體驗教學</h2>
                
                <div id="tutorial-content">
                    <p>歡迎使用棒球 AR 互動！請按照以下步驟操作：</p>
                    <div class="tutorial-steps">
                        <div class="step-item">
                            <strong>第一步：開啟 Notion 頁面</strong>
                            請至指定的 Notion 專案，找到頁面上方的辨識圖片。
                        </div>
                        <div class="step-item">
                            <strong>第二步：授權相機</strong>
                            點擊下方按鈕，並在系統彈窗中選擇「允許」以開啟相機。
                        </div>
                        <div class="step-item">
                            <strong>第三步：對準圖片</strong>
                            將鏡頭對準 Notion 頁面上方的指定圖片，即可看見棒球 AR 畫面！
                        </div>
                    </div>
                </div>

                <p id="prompt-desc" style="display:none;"></p>
                <button id="start-btn" class="btn" onclick="goToCameraRequest()">了解，開啟相機</button>
                
                <div id="manual-guide" class="instruction">
                    <strong id="guide-title">手動開啟步驟：</strong>
                    <ol id="guide-steps"></ol>
                </div>
            </div>
        </div>

        <a-scene
            vr-mode-ui="enabled: false;"
            loading-screen="enabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
            id="scene"
            embedded
            gesture-detector
        >
            <a-assets>
                <a-asset-item id="animated-asset" src="assets/asset.glb"></a-asset-item>
            </a-assets>

            <a-marker
                id="animated-marker"
                type="image"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <a-entity
                    id="bowser-model"
                    scale="1.0535576154901432 1.0535576154901432 1.0535576154901432"
                    animation-mixer="loop: repeat"
                    gltf-model="#animated-asset"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>

        <script>
            // 網頁載入時，動態偵測當前網域路徑，並自動綁定圖片給 AR 識別
            window.addEventListener('DOMContentLoaded', () => {
                // 取得當前專案的基礎目錄路徑 (解決每個裝置、伺服器路徑不同的問題)
                const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
                
                // 組合出圖片的完整絕對路徑
                const targetImageUrl = baseUrl + 'ar/assets/25f79a4e-9031-4f97-924d-4a4fc1e78cad.png';
                
                // 將動態生成的路徑寫入到 a-marker 的 url 屬性中
                const marker = document.getElementById('animated-marker');
                marker.setAttribute('url', targetImageUrl);
                
                console.log("已自動偵測裝置並載入圖片路徑:", targetImageUrl);
            });

            function goToCameraRequest() {
                document.getElementById('tutorial-content').style.display = 'none';
                document.getElementById('prompt-icon').innerText = '📷';
                document.getElementById('prompt-title').innerText = '正在要求相機權限';
                
                const desc = document.getElementById('prompt-desc');
                desc.style.display = 'block';
                desc.innerText = '請在瀏覽器隨後跳出的系統提示中點選「允許」。';
                
                document.getElementById('start-btn').style.display = 'none';

                requestCamera();
            }

            function requestCamera() {
                const timeoutId = setTimeout(() => {
                    showManualInstruction('no-response');
                }, 3000);

                navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    clearTimeout(timeoutId);
                    stream.getTracks().forEach(track => track.stop());
                    document.getElementById('permission-overlay').style.display = 'none';
                })
                .catch((err) => {
                    clearTimeout(timeoutId);
                    console.error("相機存取失敗:", err);
                    showManualInstruction('denied');
                });
            }

            function showManualInstruction(reason) {
                const title = document.getElementById('prompt-title');
                const desc = document.getElementById('prompt-desc');
                const guide = document.getElementById('manual-guide');
                const gTitle = document.getElementById('guide-title');
                const gSteps = document.getElementById('guide-steps');

                desc.style.display = 'block';
                guide.style.display = 'block';

                if (reason === 'no-response') {
                    title.innerText = "瀏覽器未回應請求";
                    desc.innerText = "系統未能主動彈出權限視窗。如果您是在 LINE 或 FB 內直接打開此網頁，這類內嵌瀏覽器通常會限制相機功能。";
                    gTitle.innerText = "請嘗試以下方法排除：";
                    gSteps.innerHTML = `
                        <li>點擊畫面右上角或右下角的<strong>「...」選單</strong>，選擇<strong>「在 Safari 中開啟」</strong>或<strong>「在 Chrome 中開啟」</strong>。</li>
                        <li>如果是標準瀏覽器，請檢查網址列左側的<strong>「鎖頭」</strong>圖示，手動將相機改為<strong>「允許」</strong>並重新整理。</li>
                        <li>請確保網址為安全連線 <strong>https://</strong>（http 無法啟動相機）。</li>
                    `;
                } else {
                    title.innerText = "相機權限遭封鎖";
                    desc.innerText = "您先前拒絕了相機存取請求。";
                    gTitle.innerText = "手動解除鎖定步驟：";
                    gSteps.innerHTML = `
                        <li>點擊網址列左側的<strong>「鎖頭」</strong>或<strong>「設定」</strong>圖示。</li>
                        <li>將<strong>「相機」</strong>權限更改為<strong>「允許」</strong>。</li>
                        <li>重新整理網頁即可。</li>
                    `;
                }
            }
        </script>
    </body>
</html>
