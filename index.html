<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>

        <style>
            #permission-overlay {
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background-color: rgba(255, 255, 255, 0.98);
                z-index: 9999; display: flex; flex-direction: column;
                align-items: center; justify-content: center;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
                padding: 20px; box-sizing: border-box; text-align: center;
            }
            .prompt-box { max-width: 420px; background: #ffffff; padding: 30px; border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
            .icon { font-size: 48px; margin-bottom: 15px; }
            h2 { color: #333; margin: 0 0 15px 0; font-size: 22px; }
            p { color: #666; font-size: 15px; line-height: 1.6; margin: 0 0 20px 0; }
            .tutorial-steps { text-align: left; background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e9ecef; }
            .step-item { margin-bottom: 15px; font-size: 14px; color: #495057; line-height: 1.5; }
            .step-item strong { color: #007aff; display: block; margin-bottom: 3px; }
            .btn { background-color: #007aff; color: white; border: none; padding: 14px 30px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; }
            .btn:hover { background-color: #0056b3; }
        </style>
    </head>

    <body style="margin: 0; overflow: hidden;">

        <div id="permission-overlay">
            <div class="prompt-box">
                <div class="icon" id="prompt-icon">⚾</div>
                <h2 id="prompt-title">棒球 AR 體驗教學</h2>
                <div id="tutorial-content">
                    <div class="tutorial-steps">
                        <div class="step-item"><strong>第一步：開啟 Notion 頁面</strong>請至指定的 Notion 專案，找到頁面上方的辨識圖片。</div>
                        <div class="step-item"><strong>第二步：授權相機</strong>點擊下方按鈕，並在系統彈窗中選擇「允許」以開啟相機。</div>
                        <div class="step-item"><strong>第三步：對準圖片</strong>將鏡頭對準指定圖片，即可看見棒球 AR 畫面！</div>
                    </div>
                </div>
                <p id="prompt-desc" style="display:none;"></p>
                <button id="start-btn" class="btn" onclick="startAR()">了解，開啟相機</button>
            </div>
        </div>

        <div id="ar-container"></div>

        <script>
            function startAR() {
                // 1. 隱藏教學與按鈕，切換為「載入中」提示
                document.getElementById('tutorial-content').style.display = 'none';
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('prompt-icon').innerText = '📷';
                document.getElementById('prompt-title').innerText = '正在啟動相機...';
                
                const desc = document.getElementById('prompt-desc');
                desc.style.display = 'block';
                desc.innerText = '請在系統跳出的提示中點選「允許」。\n如果畫面長時間全黑，請重新整理網頁。';

                // 2. 獲取動態圖片路徑
                const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
                const targetImageUrl = baseUrl + 'ar/assets/25f79a4e-9031-4f97-924d-4a4fc1e78cad.png';

                // 3. 組合 AR 場景的 HTML，直接將動態路徑塞入 url 屬性
                const arHtml = `
                    <a-scene
                        vr-mode-ui="enabled: false;"
                        loading-screen="enabled: false;"
                        renderer="logarithmicDepthBuffer: true;"
                        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
                        embedded
                        gesture-detector
                    >
                        <a-assets>
                            <a-asset-item id="animated-asset" src="assets/asset.glb"></a-asset-item>
                        </a-assets>

                        <a-marker
                            id="animated-marker"
                            type="image"
                            url="${targetImageUrl}"
                            raycaster="objects: .clickable"
                            emitevents="true"
                            cursor="fuse: false; rayOrigin: mouse;"
                        >
                            <a-entity
                                id="bowser-model"
                                scale="1.0535576154901432 1.0535576154901432 1.0535576154901432"
                                animation-mixer="loop: repeat"
                                gltf-model="#animated-asset"
                                class="clickable"
                                gesture-handler
                            ></a-entity>
                        </a-marker>
                        <a-entity camera></a-entity>
                    </a-scene>
                `;

                // 4. 將 AR 場景注入容器中，AR.js 會立刻自動發起唯一的一次相機請求
                document.getElementById('ar-container').innerHTML = arHtml;

                // 5. 移除全螢幕遮罩，讓出鏡頭畫面
                setTimeout(() => {
                    document.getElementById('permission-overlay').style.display = 'none';
                }, 1500); // 稍微延遲 1.5 秒讓使用者看到提示文字再消失
            }
        </script>
    </body>
</html>
